<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDR24 HOS · Documentation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9A%95%EF%B8%8F</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#f4f7fb; --surface:#fff; --surface2:#f8fafd; --border:#e3e9f1;
      --text:#111b2b; --muted:#5b6b82; --brand:#1b7df5; --teal:#0a8b75;
      --shadow:0 1px 2px rgba(30,50,90,.06), 0 18px 40px -22px rgba(30,50,90,.28);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);
      background:radial-gradient(1100px 600px at 100% -10%,rgba(27,125,245,.10),transparent 60%),
      radial-gradient(900px 500px at -5% 8%,rgba(10,139,117,.10),transparent 55%),var(--bg);}
    .top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 22px;
      background:rgba(255,255,255,.78);backdrop-filter:blur(14px) saturate(160%);border-bottom:1px solid var(--border)}
    .mark{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
      background:linear-gradient(135deg,var(--brand),var(--teal));box-shadow:0 6px 16px -6px rgba(27,125,245,.7)}
    .brand{font-family:'Plus Jakarta Sans';font-weight:800;font-size:18px;letter-spacing:-.02em;line-height:1}
    .brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}
    .top a.btn{margin-left:auto;text-decoration:none;font-weight:600;font-size:13.5px;color:var(--brand);
      border:1px solid var(--border);background:var(--surface2);padding:9px 14px;border-radius:11px}
    .top a.btn:hover{border-color:var(--brand)}
    .wrap{max-width:980px;margin:0 auto;padding:34px 22px 80px}
    .doc{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:42px 48px}
    .doc h1{font-family:'Plus Jakarta Sans';font-weight:800;font-size:30px;letter-spacing:-.02em;margin:.2em 0 .5em;
      background:linear-gradient(120deg,#2a8bff,#16ad8f);-webkit-background-clip:text;background-clip:text;color:transparent}
    .doc h2{font-family:'Plus Jakarta Sans';font-weight:800;font-size:22px;margin:1.7em 0 .6em;padding-top:.6em;border-top:1px solid var(--border)}
    .doc h3{font-weight:700;font-size:16.5px;margin:1.3em 0 .5em}
    .doc h4{font-weight:700;font-size:14px;color:var(--muted);margin:1.1em 0 .4em}
    .doc p,.doc li{font-size:15px;line-height:1.72;color:#26344a}
    .doc a{color:var(--brand);text-decoration:none}
    .doc a:hover{text-decoration:underline}
    .doc strong{font-weight:700;color:var(--text)}
    .doc hr{border:none;border-top:1px solid var(--border);margin:1.8em 0}
    .doc code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:1px 6px}
    .doc pre{background:#0b1220;color:#dbe7ff;border-radius:12px;padding:16px 18px;overflow:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6}
    .doc pre code{background:none;border:none;color:inherit;padding:0}
    .doc blockquote{margin:1em 0;padding:10px 16px;border-left:3px solid var(--brand);background:var(--surface2);border-radius:0 10px 10px 0;color:var(--muted)}
    .doc ul,.doc ol{padding-left:22px}
    .doc table{width:100%;border-collapse:separate;border-spacing:0;margin:1.1em 0;font-size:13.5px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .doc th{text-align:left;background:var(--surface2);font-weight:700;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--border)}
    .doc td{padding:11px 14px;border-bottom:1px solid var(--border);color:#26344a}
    .doc tr:last-child td{border-bottom:none}
    .doc .center{text-align:center}
    .loading,.errbox{padding:60px 20px;text-align:center;color:var(--muted)}
    .errbox code{display:inline-block;margin-top:8px}
    .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
    @keyframes sp{to{transform:rotate(360deg)}}
    @media(max-width:640px){.doc{padding:26px 20px}.doc h1{font-size:25px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="mark">⚕️</div>
    <div class="brand">MyDR24 · HOS <small>Documentation</small></div>
    <a class="btn" href="../index.html">← Back to the panel</a>
  </header>
  <div class="wrap">
    <div class="doc" id="doc">
      <div class="loading"><div class="spin"></div>Loading documentation…</div>
    </div>
  </div>

  <script>
    /* Minimal, dependency-free Markdown → HTML renderer (headings, tables,
       lists, code, blockquotes, hr, inline bold/code/links). */
    function inline(s){
      return s
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g,'<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
    }
    function render(md){
      md = md.replace(/<!--[\s\S]*?-->/g,'');                 // drop comments
      md = md.replace(/<div align="center">/g,'<div class="center">'); // keep center blocks
      var lines = md.split(/\r?\n/), out=[], i=0;
      function flushList(buf,ord){ if(!buf.length)return ''; var t=ord?'ol':'ul';
        return '<'+t+'>'+buf.map(function(x){return '<li>'+inline(x)+'</li>';}).join('')+'</'+t+'>'; }
      while(i<lines.length){
        var ln=lines[i];
        // fenced code
        if(/^```/.test(ln)){ var code=[]; i++; while(i<lines.length && !/^```/.test(lines[i])){ code.push(lines[i]); i++; } i++;
          out.push('<pre><code>'+code.join('\n').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>'); continue; }
        // table
        if(/^\s*\|/.test(ln) && i+1<lines.length && /^\s*\|?\s*:?-{2,}/.test(lines[i+1])){
          var head=ln.split('|').slice(1,-1).map(function(c){return c.trim();});
          i+=2; var rows=[];
          while(i<lines.length && /^\s*\|/.test(lines[i])){ rows.push(lines[i].split('|').slice(1,-1).map(function(c){return c.trim();})); i++; }
          out.push('<table><thead><tr>'+head.map(function(h){return '<th>'+inline(h)+'</th>';}).join('')+'</tr></thead><tbody>'+
            rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>'); continue; }
        // headings
        var h=ln.match(/^(#{1,6})\s+(.*)$/);
        if(h){ out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>'); i++; continue; }
        // hr
        if(/^\s*(-{3,}|\*{3,})\s*$/.test(ln)){ out.push('<hr/>'); i++; continue; }
        // blockquote
        if(/^\s*>\s?/.test(ln)){ var bq=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
          out.push('<blockquote>'+inline(bq.join(' '))+'</blockquote>'); continue; }
        // unordered list
        if(/^\s*[-*]\s+/.test(ln)){ var ul=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ ul.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
          out.push(flushList(ul,false)); continue; }
        // ordered list
        if(/^\s*\d+\.\s+/.test(ln)){ var ol=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ ol.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
          out.push(flushList(ol,true)); continue; }
        // raw html passthrough
        if(/^\s*<\/?(div|p|br)/i.test(ln)){ out.push(ln); i++; continue; }
        // blank
        if(/^\s*$/.test(ln)){ i++; continue; }
        // paragraph
        out.push('<p>'+inline(ln)+'</p>'); i++;
      }
      return out.join('\n');
    }

    fetch('MyDR24-HOS-Documentation.md')
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
      .then(function(md){ document.getElementById('doc').innerHTML = render(md); })
      .catch(function(e){
        document.getElementById('doc').innerHTML =
          '<div class="errbox"><h2 style="border:none">Couldn\'t load the document</h2>'+
          '<p>This viewer needs to be opened through a local web server (browsers block <code>fetch</code> over <code>file://</code>).</p>'+
          '<p>From the project root run:</p><pre><code>python3 -m http.server 8080</code></pre>'+
          '<p>then open <code>http://localhost:8080/docs/</code></p>'+
          '<p style="opacity:.6">('+e.message+')</p></div>';
      });
  </script>
</body>
</html>
